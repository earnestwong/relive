name: Build and Push Multi-arch Image

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v0.3.0)'
        required: true
        default: 'latest'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: linux/amd64,linux/arm64

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver-opts: network=host

      - name: Login to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract version from tag
        id: version
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> $GITHUB_OUTPUT
          else
            echo "version=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT
          fi

      - name: Set build time
        id: buildtime
        run: echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_OUTPUT

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            davidhu/relive:${{ steps.version.outputs.version }}
            davidhu/relive:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            BUILD_TIME=${{ steps.buildtime.outputs.build_time }}

      - name: Verify image
        run: |
          echo "Verifying image..."
          docker buildx imagetools inspect davidhu/relive:${{ steps.version.outputs.version }}

      - name: Test image
        run: |
          echo "Testing amd64..."
          docker run --rm --platform linux/amd64 davidhu/relive:${{ steps.version.outputs.version }} /app/relive --version || echo "Test skipped"

          echo "Testing arm64..."
          docker run --rm --platform linux/arm64 davidhu/relive:${{ steps.version.outputs.version }} /app/relive --version || echo "Test skipped"

      - name: Create release notes
        run: |
          cat > release-notes.md << EOF
          ## Docker Image

          Single image with embedded frontend, multi-architecture support:
          - ✅ linux/amd64 (Intel/AMD x86_64)
          - ✅ linux/arm64 (Apple Silicon, ARM NAS, Raspberry Pi)

          ### Pull Image
          \`\`\`bash
          docker pull davidhu/relive:${{ steps.version.outputs.version }}
          \`\`\`

          ### Deploy
          \`\`\`bash
          docker run -d \
            -p 8080:8080 \
            -v ./data:/app/data \
            -v /path/to/photos:/app/photos:ro \
            -e JWT_SECRET=your-secret-key \
            davidhu/relive:${{ steps.version.outputs.version }}
          \`\`\`

          Access: http://localhost:8080

          ### Image Size
          ~75MB (per architecture, includes frontend)

          See [Deployment Guide](https://github.com/davidhoo/relive/blob/main/docs/DEPLOY_FROM_DOCKERHUB.md) for details.
          EOF

          cat release-notes.md

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md
