; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html
;
; 编译指定环境:
;   pio run -e esp32s3-devkitm
;   pio run -e esp32s3-zero

; ===================== 公共配置 =====================
[env]
platform = https://github.com/pioarduino/platform-espressif32/releases/latest/download/platform-espressif32.zip
framework = arduino
monitor_speed = 115200

board_build.flash_mode = qio
board_build.f_flash = 80000000L
board_upload.flash_size = 4MB
board_build.partitions = default.csv

build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBOARD_HAS_PSRAM

lib_deps =
    bblanchon/ArduinoJson@^7
    adafruit/Adafruit GFX Library@^1.11
    adafruit/Adafruit BusIO@^1.16

; ===================== ESP32-S3-DevKitM-1 (8MB PSRAM) =====================
[env:esp32s3-devkitm]
board = esp32-s3-devkitm-1
board_build.arduino.memory_type = qio_opi

build_flags =
    ${env.build_flags}
    -mfix-esp32-psram-cache-issue

; ===================== ESP32-S3-Zero (2MB PSRAM) =====================
[env:esp32s3-zero]
board = waveshare_esp32_s3_zero
board_build.arduino.memory_type = qio_qspi

; ===================== ESP32-S3-WROOM-1 N8R8 (8MB Flash + 8MB PSRAM) =====================
[env:esp32s3-wroom-1-n8r8]
board = esp32-s3-devkitc-1
board_build.flash_mode = dio
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 8MB
board_build.partitions = default_8MB.csv

build_flags =
    ; CH340 UART 桥接，不使用 USB CDC，Serial 映射到 UART0
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=0
    -DBOARD_HAS_PSRAM
    -mfix-esp32-psram-cache-issue

lib_deps =
    ${env.lib_deps}
